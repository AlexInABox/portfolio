name: Blogslopbot

on:
  workflow_dispatch:
  push:
    branches:
      - main
#    paths:
#      - "blogslopbot/**"

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4
        env:
          DOCKER_HOST: tcp://docker-in-docker:2375

      - id: downcase
        name: downcase REPO_OWNER
        run: |
          OWNER=${GITHUB_REPOSITORY%%/*}
          echo "REPO_OWNER=${OWNER,,}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: git.zeitvertreib.vip
          username: ${{ steps.downcase.outputs.REPO_OWNER }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - id: tags
        run: |
          OWNER=${{ steps.downcase.outputs.REPO_OWNER }}
          IMG="git.zeitvertreib.vip/${OWNER}/blogslopbot"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tags=$IMG:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=$IMG:${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: blogslopbot
          file: blogslopbot/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
